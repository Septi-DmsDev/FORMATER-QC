<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Internal Tools - Formatter & QR Generator</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>

    <style>
        :root {
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-main: #212529;
            --text-muted: #6c757d;
            --border-color: #dee2e6;
            --primary: #0f172a;
            --primary-accent: #3b82f6;
            --success: #10b981;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 30px 20px;
            box-sizing: border-box;
            min-height: 100vh;
        }

        .dashboard-header {
            max-width: 1200px;
            margin: 0 auto 30px auto;
            text-align: center;
        }

        .dashboard-header h1 {
            font-size: 24px;
            margin: 0;
            color: var(--primary);
        }

        /* Layout Grid */
        .tools-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            max-width: 1200px;
            margin: 0 auto;
            align-items: start;
        }

        .tool-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 1px solid var(--border-color);
        }

        .tool-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
        }

        .tool-header h2 {
            margin: 0;
            font-size: 18px;
            color: var(--primary);
        }

        /* --- Styles Formatter --- */
        textarea {
            width: 100%;
            min-height: 120px;
            padding: 12px;
            font-family: inherit;
            font-size: 14px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            margin-bottom: 15px;
            resize: vertical;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }
        textarea:focus {
            border-color: var(--primary-accent);
            outline: none;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        .notif {
            font-size: 13px;
            color: var(--success);
            min-height: 18px;
            margin-bottom: 10px;
            text-align: center;
        }

        /* --- Styles QR Generator --- */
        .input-wrapper {
            position: relative;
            margin-bottom: 20px;
        }
        .input-wrapper .bi-link-45deg {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 20px;
        }
        #qr-text {
            width: 100%;
            padding: 12px 12px 12px 40px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 14px;
        }
        #qr-text:focus {
            border-color: var(--primary-accent);
            outline: none;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        #qr-code-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 250px;
            background: #f8f9fa;
            border: 2px dashed var(--border-color);
            border-radius: 8px;
            margin-bottom: 20px;
            padding: 20px;
        }
        #qr-code img, #qr-code canvas {
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 10px;
            background: white;
        }
        #qr-message {
            color: var(--text-muted);
            text-align: center;
        }
        #qr-message i { font-size: 40px; color: #ced4da; }
        #action-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        /* Global Buttons */
        button {
            padding: 10px 15px;
            font-size: 14px;
            font-weight: 500;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        button.primary {
            background-color: var(--primary);
            color: white;
        }
        button.primary:hover { background-color: #334155; }
        button.secondary {
            background-color: white;
            color: var(--primary);
            border: 1px solid var(--border-color);
        }
        button.secondary:hover { background-color: #f1f5f9; }

        .hidden { display: none !important; }

        @media (max-width: 768px) {
            .tools-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="dashboard-header">
        <h1>Internal Utility Tools</h1>
    </div>

    <div class="tools-container">
        <div class="tool-card">
            <div class="tool-header">
                <i class="bi bi-text-paragraph fs-4 text-primary"></i>
                <h2>Formatter Nama Otomatis</h2>
            </div>
            
            <textarea id="input" placeholder="Paste data di sini...&#10;Contoh:&#10;01 Semangat Kak&#10;01. Semangat Kak"></textarea>
            
            <div class="btn-group">
                <button class="primary" style="flex: 1;" onclick="formatNama()">
                    <i class="bi bi-magic"></i> Proses Text
                </button>
                <button class="secondary" style="flex: 1;" onclick="copyFormatterText()">
                    <i class="bi bi-clipboard"></i> Copy Text
                </button>
            </div>
            
            <div id="notif" class="notif"></div>
            
            <textarea id="output" placeholder="Hasil format akan muncul di sini..."></textarea>
        </div>

        <div class="tool-card">
            <div class="tool-header">
                <i class="bi bi-qr-code-scan fs-4 text-primary"></i>
                <h2>QR Code Generator</h2>
            </div>

            <div class="input-wrapper">
                <i class="bi bi-link-45deg"></i>
                <input type="text" id="qr-text" placeholder="https://zavierinvitation.com">
            </div>
            
            <div id="qr-code-container">
                <div id="qr-code"></div>
                <div id="qr-message">
                    <i class="bi bi-upc-scan"></i>
                    <p>QR Code Anda akan tampil di sini</p>
                </div>
            </div>
            
            <div id="action-buttons" class="hidden">
                <button id="download-btn" class="primary">
                    <i class="bi bi-download"></i> Unduh (.png)
                </button>
                <button id="copy-btn" class="secondary">
                    <i class="bi bi-clipboard"></i> Salin Gambar
                </button>
            </div>
        </div>
    </div>

    <script>
        /* --- SCRIPT FORMATTER --- */
        function toTitleCase(str) {
            let result = str.toLowerCase().replace(/\b\w/g, (c) => c.toUpperCase());
            result = result.replace(/\bRt([-. ]*)(\d+)\b/gi, (m, sep, num) => "RT" + sep + num);
            result = result.replace(/\bRt\b/gi, "RT");
            result = result.replace(/\bRw([-. ]*)(\d+)\b/gi, (m, sep, num) => "RW" + sep + num);
            result = result.replace(/\bRw\b/gi, "RW");
            result = result.replace(/\b(Sd|Smp|Sma|Spbu|Sdn|Smpn|Sman|Smk|Smkn|Mi|lokasi|Rsud|Pt|Rm|Tpu|Cv|Mtq|Kua|Tni|Pln|Dpr|Bpjs|MPR|gki|tk|Mtsn)\b/gi, match => match.toUpperCase());
            return result;
        }

        function formatNama() {
            const inputText = document.getElementById("input").value;
            const lines = inputText.split("\n");
            const shortcutMap = { Kecamatan: "Kec.", Kabupaten: "Kab.", Jalan: "Jl.", Desa: "Ds.", Kampung: "Kp.", Kelurahan: "Kel.", Dusun: "Dsn." };
            const locationWords = ["Kec", "Kab", "Jl", "Ds", "Kp", "Kel", "Dsn"];

            const cleaned = lines.map((line) => {
                let nameOnly = line.trim();
                locationWords.forEach((word) => {
                    const regexVariations = new RegExp(`\\b${word}([^\\w.]|$)`, "gi");
                    nameOnly = nameOnly.replace(regexVariations, `${word}. `);
                });
                for (const [key, val] of Object.entries(shortcutMap)) {
                    const regex = new RegExp("\\b" + key + "\\b", "gi");
                    nameOnly = nameOnly.replace(regex, val);
                }
                nameOnly = nameOnly.replace(/\bRT\s*(\d+)\b/gi, "RT.$1").replace(/\bRW\s*(\d+)\b/gi, "RW.$1").replace(/RT\.(\d+)[\s,\/\\-]*RW\.(\d+)/gi, "RT.$1/RW.$2");
                nameOnly = nameOnly.replace(/^\d+[.\s-]*/, "").replace(/^[-*]\s*/, "");
                if (/^[A-Za-z]\.\s+/.test(nameOnly)) nameOnly = nameOnly.replace(/^[A-Za-z]\.\s+/, "");
                nameOnly = nameOnly.replace(/^(Nama Mempelai Wanita|Nama Memp\.Pria|Alamat)\s*:\s*/i, "");
                nameOnly = nameOnly.replace(/(?<!^)\s+(?=(Ds\.|Dsn\.|Kp\.|Kec\.|Kab\.|RT\.))/gi, ", ").replace(/^,\s*/, "");
                nameOnly = toTitleCase(nameOnly.trim());
                locationWords.forEach((word) => {
                    const regexStuck = new RegExp(`\\b${word}[.]([A-Za-z])`, "gi");
                    nameOnly = nameOnly.replace(regexStuck, `${word}. $1`);
                });
                nameOnly = nameOnly.replace(/,+/g, ",").replace(/,(?!\s)/g, ", ").replace(/,([A-Z])/g, ", $1").replace(/(\w),(\w)/g, "$1, $2").replace(/,\s*$/, "").replace(/\.\s*$/, "");
                nameOnly = nameOnly.replace(/\.{2,}/g, ".").replace(/\.\s*,/g, ".").replace(/\s*,\s*/g, ", ").replace(/\s+\./g, ".").replace(/\.\s+/g, ". ").replace(/\s{2,}/g, " ");
                nameOnly = nameOnly.replace(/\.{2,}/g, "").replace(/amp;/gi, "").replace(/[^\x20-\x7E\u00A0-\u00FF\u0100-\u017F]/g, "").replace(/^=+/, "");
                return nameOnly;
            }).filter((line) => line !== "");

            document.getElementById("output").value = cleaned.join("\n");
            document.getElementById("notif").innerText = "Teks berhasil diformat!";
            setTimeout(() => { document.getElementById("notif").innerText = ""; }, 2000);
        }

        function copyFormatterText() {
            const outputText = document.getElementById("output").value;
            if (outputText.trim() === "") return;
            navigator.clipboard.writeText(outputText).then(() => {
                document.getElementById("notif").innerText = "Hasil teks disalin ke clipboard!";
                setTimeout(() => document.getElementById("notif").innerText = "", 2000);
            });
        }

        function ambilSrcIframe() {
            const inputText = document.getElementById("input").value;
            const match = inputText.match(/src="([^"]+)"/);
            if (match && match[1]) {
                document.getElementById("output").value = match[1];
                navigator.clipboard.writeText(match[1]).then(() => {
                    document.getElementById("notif").innerText = "Link G-Maps disalin!";
                    setTimeout(() => document.getElementById("notif").innerText = "", 2000);
                });
            }
        }

        function prosesNamaDanTanggal(value) {
            const match = value.trim().match(/^(.+?)\s*&\s*(.+?)\s+(\d{1,2}\s+\w+\s+\d{4})$/i);
            if (match) {
                const hasil = `${match[1].toLowerCase().replace(/\s+/g, "-")}-${match[2].toLowerCase().replace(/\s+/g, "-")} ${match[3]}`;
                document.getElementById("output").value = hasil;
                navigator.clipboard.writeText(hasil);
            }
        }

        document.getElementById("input").addEventListener("keydown", function (e) {
            if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); formatNama(); }
        });

        document.getElementById("input").addEventListener("paste", function () {
            setTimeout(() => {
                const isi = document.getElementById("input").value;
                if (isi.includes("<iframe") && isi.includes("src=")) {
                    ambilSrcIframe();
                } else {
                    formatNama();
                    copyFormatterText();
                }
            }, 100);
        });

        window.addEventListener("keydown", function(e) {
            if (e.ctrlKey && e.key === "Enter") {
                e.preventDefault();
                const valueToProcess = document.activeElement.id === "output" ? document.getElementById("output").value : document.getElementById("input").value;
                prosesNamaDanTanggal(valueToProcess);
            }
        });


        /* --- SCRIPT QR CODE GENERATOR --- */
        const qrTextInput = document.getElementById('qr-text');
        const qrCodeContainer = document.getElementById('qr-code');
        const qrMessage = document.getElementById('qr-message');
        const actionButtons = document.getElementById('action-buttons');
        let debounceTimer;

        const generateQRCode = () => {
            const text = qrTextInput.value.trim();
            if (!text) {
                qrCodeContainer.innerHTML = '';
                qrMessage.classList.remove('hidden');
                actionButtons.classList.add('hidden');
                return;
            }

            qrMessage.classList.add('hidden');
            qrCodeContainer.innerHTML = '';
            
            new QRCode(qrCodeContainer, {
                text: text,
                width: 256,
                height: 256,
                colorDark: "#000000ff",
                colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.H
            });
            actionButtons.classList.remove('hidden');
            // Menghapus trigger otomatis copyBtn.click() karena diblokir browser jika tanpa interaksi asli user
        };

        qrTextInput.addEventListener('input', () => {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(generateQRCode, 500); 
        });

        const addBorderToCanvas = (sourceCanvas, borderSize) => {
            const newCanvas = document.createElement('canvas');
            const ctx = newCanvas.getContext('2d');
            const newWidth = sourceCanvas.width + borderSize * 2;
            const newHeight = sourceCanvas.height + borderSize * 2;
            
            newCanvas.width = newWidth;
            newCanvas.height = newHeight;
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, newWidth, newHeight);
            ctx.drawImage(sourceCanvas, borderSize, borderSize);
            return newCanvas;
        };

        document.getElementById('download-btn').addEventListener('click', () => {
            const originalCanvas = qrCodeContainer.querySelector('canvas');
            if (!originalCanvas) return;
            const canvasWithBorder = addBorderToCanvas(originalCanvas, 12);
            const link = document.createElement('a');
            link.href = canvasWithBorder.toDataURL('image/png');
            link.download = 'qr-code-zavier.png';
            link.click();
        });

        // FIXED COPY SCRIPT MENGGUNAKAN PROMISE UNTUK CLIPBOARD API
        const copyBtn = document.getElementById('copy-btn');
        copyBtn.addEventListener('click', async () => {
            const originalCanvas = qrCodeContainer.querySelector('canvas');
            if (!originalCanvas) return;

            const icon = copyBtn.querySelector('i');
            if (icon.classList.contains('bi-clipboard-check-fill')) return;

            try {
                const canvasWithBorder = addBorderToCanvas(originalCanvas, 12);
                
                // Perbaikan: Bungkus toBlob dalam Promise lalu pass ke ClipboardItem
                // Ini mencegah browser kehilangan konteks "user activation"
                const blobPromise = new Promise(resolve => canvasWithBorder.toBlob(resolve, 'image/png'));
                await navigator.clipboard.write([
                    new ClipboardItem({ 'image/png': blobPromise })
                ]);

                // Feedback UI
                icon.className = 'bi bi-clipboard-check-fill';
                const originalText = copyBtn.innerText;
                copyBtn.innerHTML = `<i class="bi bi-clipboard-check-fill"></i> Berhasil`;
                copyBtn.style.backgroundColor = '#d1e7dd';
                copyBtn.style.borderColor = '#badbcc';
                copyBtn.style.color = '#0f5132';

                setTimeout(() => {
                    copyBtn.innerHTML = `<i class="bi bi-clipboard"></i> Salin Gambar`;
                    copyBtn.style.backgroundColor = '';
                    copyBtn.style.borderColor = '';
                    copyBtn.style.color = '';
                }, 2000);

            } catch (err) {
                console.error('Gagal menyalin gambar:', err);
                alert('Gagal menyalin. Pastikan web diakses via localhost atau HTTPS.');
            }
        });
    </script>
</body>
</html>
